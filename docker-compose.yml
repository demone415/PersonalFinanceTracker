# Finance Tracker — local development stack.
#
# All services start with a single:  docker compose up
#
# Startup order (via healthcheck depends_on):
#   postgres → supabase-auth → backend (runs migrations) → db-seed (SQL) → frontend

services:
  # ── PostgreSQL (Supabase image — includes the auth.* schema) ────────────────
  postgres:
    image: supabase/postgres:15.1.0.147
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-finance}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-finance}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis (FusionCache backplane + rate-limit counters) ──────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── RabbitMQ (Wolverine message bus + DLQ) ───────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI — dev only
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── MinIO (S3-compatible; bucket `finance-files` created at app startup) ─────
  minio:
    image: minio/minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"     # console — dev only
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Supabase GoTrue (authentication; issues HS256 JWTs) ─────────────────────
  # Serves at root on port 9999. The frontend nginx proxies /auth/v1/* → :9999/
  # (strips the prefix). The .NET backend calls it internally at :9999/admin/*.
  supabase-auth:
    image: supabase/gotrue:v2.151.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST:              0.0.0.0
      PORT:                         "9999"
      API_EXTERNAL_URL:             ${GOTRUE_EXTERNAL_URL:-http://localhost:9999}
      GOTRUE_DB_DRIVER:             postgres
      GOTRUE_DB_DATABASE_URL:       "postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-finance}?search_path=auth"
      GOTRUE_SITE_URL:              ${GOTRUE_SITE_URL:-http://localhost:3000}
      GOTRUE_JWT_SECRET:            ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_ISSUER:            "${GOTRUE_EXTERNAL_URL:-http://localhost:9999}/auth/v1"
      GOTRUE_JWT_AUD:               authenticated
      GOTRUE_JWT_EXP:               "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES:       service_role
      GOTRUE_DISABLE_SIGNUP:        "false"
      GOTRUE_MAILER_AUTOCONFIRM:    "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_RATE_LIMIT_HEADER:     X-Forwarded-For
      GOTRUE_RATE_LIMIT_TOKEN_REFRESH: "30"
    ports:
      - "9999:9999"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # ── Backend (.NET 10 API) ─────────────────────────────────────────────────────
  # Waits for GoTrue to be healthy, then runs EF migrations before starting to
  # accept requests. Demo data is seeded separately by the `db-seed` service.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      supabase-auth:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT:    ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-finance};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      ConnectionStrings__Redis:  "redis:6379"
      RabbitMq__Host:            rabbitmq
      RabbitMq__Username:        ${RABBITMQ_USER:-guest}
      RabbitMq__Password:        ${RABBITMQ_PASSWORD:-guest}
      S3__Endpoint:              "http://minio:9000"
      S3__AccessKey:             ${MINIO_ROOT_USER:-minioadmin}
      S3__SecretKey:             ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3__BucketName:            finance-files
      Supabase__JwtSecret:       ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      Supabase__Issuer:          "${GOTRUE_EXTERNAL_URL:-http://localhost:9999}/auth/v1"
      Supabase__Audience:        authenticated
      ReceiptProvider__Token:    ${RECEIPT_PROVIDER_TOKEN:-}
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── DB seed (one-shot) ───────────────────────────────────────────────────────
  # Seeds demo data via SQL, only under Docker. Waits for the backend (EF
  # migrations applied → public.* tables exist) and GoTrue (auth.* schema ready),
  # runs seed.sql once and exits. The script is idempotent, so re-runs are no-ops.
  db-seed:
    image: postgres:15-alpine
    depends_on:
      backend:
        condition: service_healthy
      supabase-auth:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./backend/db/seed.sql:/seed/seed.sql:ro
    entrypoint: ["sh", "-c", "psql -h postgres -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-finance} -v ON_ERROR_STOP=1 -f /seed/seed.sql"]
    restart: "no"

  # ── Frontend (React SPA via nginx) ───────────────────────────────────────────
  # Waits for the seed to finish so the demo logins exist on first paint.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:          ${VITE_API_URL:-http://localhost:5000}
        VITE_SUPABASE_URL:     ${VITE_SUPABASE_URL:-http://localhost:3000}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-local-anon-key}
    depends_on:
      backend:
        condition: service_healthy
      supabase-auth:
        condition: service_healthy
      db-seed:
        condition: service_completed_successfully
    ports:
      - "3000:80"

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
