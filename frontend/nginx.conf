server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Auth proxy: supabase-js calls <origin>/auth/v1/* — forward to standalone
    # GoTrue (which serves at root). The trailing slash strips the /auth/v1/
    # prefix. Same-origin, so no CORS. (In full Supabase this is Kong's job.)
    location /auth/v1/ {
        proxy_pass http://supabase-auth:9999/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA history fallback — let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted assets emitted by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
