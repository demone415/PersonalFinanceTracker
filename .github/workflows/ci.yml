name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint · build · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FinanceTracker.slnx

      # Lint is enforced by the build: Directory.Build.props sets
      # TreatWarningsAsErrors=true + EnforceCodeStyleInBuild=true, so any
      # style/analyzer violation fails compilation.
      - name: Build (Release, warnings-as-errors)
        run: dotnet build FinanceTracker.slnx --no-restore -c Release

      # Unit + integration tests. Integration tests spin up PostgreSQL via
      # Testcontainers, which uses the Docker daemon preinstalled on the runner.
      - name: Test
        run: dotnet test FinanceTracker.slnx --no-build -c Release --verbosity normal

  frontend:
    name: Frontend (lint · type-check · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
